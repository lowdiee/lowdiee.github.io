```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>LOWDIEE Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  padding:28px;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at top left, rgba(88,101,242,.15), transparent 30%),
  radial-gradient(circle at bottom right, rgba(0,180,255,.12), transparent 30%);
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  backdrop-filter:blur(100px);
  z-index:-1;
}

.container{
  max-width:1450px;
  margin:auto;
}

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:28px;
  flex-wrap:wrap;
  gap:20px;
}

.logo{
  font-size:40px;
  font-weight:800;
  letter-spacing:-2px;
}

.logo span{
  opacity:.4;
  font-weight:500;
}

.live{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 18px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(20px);
  font-size:13px;
}

.live-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#71ffb4;
  box-shadow:0 0 12px #71ffb4;
  animation:pulse 1.4s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.5);}
  100%{transform:scale(1);}
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
  margin-bottom:22px;
}

.card{
  position:relative;
  overflow:hidden;
  padding:28px;
  border-radius:32px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(24px);
  transition:.3s;
}

.card:hover{
  transform:translateY(-4px);
  border-color:rgba(255,255,255,.14);
}

.label{
  font-size:14px;
  opacity:.5;
  margin-bottom:16px;
}

.value{
  font-size:44px;
  font-weight:800;
  letter-spacing:-2px;
}

.green{
  color:#72ffb5;
}

.chart-card{
  padding:32px;
  border-radius:34px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(24px);
}

.chart-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:28px;
}

.chart-title{
  font-size:30px;
  font-weight:700;
  letter-spacing:-1px;
}

.badge{
  padding:10px 16px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  font-size:13px;
  opacity:.8;
}

.chart-wrapper{
  height:420px;
}

.section-title{
  margin-top:34px;
  margin-bottom:18px;
  font-size:28px;
  font-weight:700;
  letter-spacing:-1px;
}

.videos-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
  gap:20px;
}

.video-card{
  overflow:hidden;
  border-radius:30px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  transition:.3s;
}

.video-card:hover{
  transform:translateY(-4px);
}

.video-thumb{
  width:100%;
  height:210px;
  object-fit:cover;
}

.video-info{
  padding:22px;
}

.video-title{
  font-size:17px;
  line-height:1.5;
  font-weight:600;
  margin-bottom:12px;
}

.video-stats{
  opacity:.55;
  font-size:14px;
}

.footer{
  margin-top:40px;
  text-align:center;
  opacity:.3;
  font-size:13px;
}

@media(max-width:768px){

  body{
    padding:18px;
  }

  .logo{
    font-size:28px;
  }

  .value{
    font-size:34px;
  }

  .chart-wrapper{
    height:320px;
  }

  .chart-card{
    padding:22px;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="navbar">

    <div class="logo">
      LOWDIEE <span>dashboard</span>
    </div>

    <div class="live">
      <div class="live-dot"></div>
      LIVE DATA
    </div>

  </div>

  <div class="stats-grid">

    <div class="card">
      <div class="label">
        Subscribers
      </div>
      <div class="value" id="subs">
        --
      </div>
    </div>

    <div class="card">
      <div class="label">
        Total Channel Views
      </div>
      <div class="value" id="views">
        --
      </div>
    </div>

    <div class="card">
      <div class="label">
        Uploaded Videos
      </div>
      <div class="value" id="videos">
        --
      </div>
    </div>

    <div class="card">
      <div class="label">
        Average Views / Short
      </div>
      <div class="value green" id="avgViews">
        --
      </div>
    </div>

  </div>

  <div class="chart-card">

    <div class="chart-header">

      <div class="chart-title">
        Top Recent Shorts
      </div>

      <div class="badge">
        Latest uploads
      </div>

    </div>

    <div class="chart-wrapper">
      <canvas id="viewsChart"></canvas>
    </div>

  </div>

  <div class="section-title">
    Recent Shorts
  </div>

  <div class="videos-grid" id="videosGrid"></div>

  <div class="footer">
    LOWDIEE YouTube Performance Dashboard
  </div>

</div>

<script>

function formatNumber(num){

  num = Number(num);

  if(num >= 1000000){
    return (num / 1000000).toFixed(1) + "M";
  }

  if(num >= 1000){
    return (num / 1000).toFixed(1) + "K";
  }

  return num;

}

async function loadDashboard(){

  try{

    const response =
      await fetch("/api/youtube");

    const data =
      await response.json();

    console.log(data);

    const channel =
      data.channel;

    const stats =
      channel.statistics;

    /*
      MAIN STATS
    */

    document.getElementById("subs").innerText =
      formatNumber(stats.subscriberCount);

    document.getElementById("views").innerText =
      formatNumber(stats.viewCount);

    document.getElementById("videos").innerText =
      formatNumber(stats.videoCount);

    /*
      AVERAGE VIEWS
    */

    const totalViews =
      data.videos.reduce(
        (acc, video) =>
          acc + Number(video.views),
        0
      );

    const avgViews =
      Math.floor(
        totalViews /
        data.videos.length
      );

    document.getElementById("avgViews").innerText =
      formatNumber(avgViews);

    /*
      VIDEO CARDS
    */

    const videosGrid =
      document.getElementById(
        "videosGrid"
      );

    videosGrid.innerHTML = "";

    data.videos.forEach(video => {

      videosGrid.innerHTML += `

        <div class="video-card">

          <img
            class="video-thumb"
            src="${video.thumbnail}">

          <div class="video-info">

            <div class="video-title">
              ${video.title}
            </div>

            <div class="video-stats">

              ${formatNumber(video.views)} views
              •
              ${formatNumber(video.likes)} likes
              •
              ${formatNumber(video.comments)} comments

            </div>

          </div>

        </div>

      `;

    });

    /*
      CHART
    */

    const ctx =
      document
      .getElementById("viewsChart")
      .getContext("2d");

    new Chart(ctx, {

      type:"bar",

      data:{

        labels:data.videos.map(video => {

          let title =
            video.title;

          if(title.length > 18){

            title =
              title.slice(0,18)
              + "...";

          }

          return title;

        }),

        datasets:[{

          data:data.videos.map(video =>
            Number(video.views)
          ),

          borderRadius:12,

          backgroundColor:
            "rgba(56,189,248,.75)",

          hoverBackgroundColor:
            "rgba(56,189,248,1)"

        }]

      },

      options:{

        responsive:true,

        maintainAspectRatio:false,

        plugins:{

          legend:{
            display:false
          },

          tooltip:{

            callbacks:{

              label:function(context){

                return (
                  formatNumber(
                    context.raw
                  )
                  + " views"
                );

              }

            }

          }

        },

        scales:{

          x:{

            ticks:{
              color:"rgba(255,255,255,.7)"
            },

            grid:{
              display:false
            }

          },

          y:{

            ticks:{

              color:"rgba(255,255,255,.7)",

              callback:function(value){

                return formatNumber(value);

              }

            },

            grid:{
              color:"rgba(255,255,255,.04)"
            }

          }

        }

      }

    });

  }

  catch(err){

    console.error(err);

    alert(
      "Could not load YouTube data."
    );

  }

}

loadDashboard();

</script>

</body>
</html>
```
