<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>LOWDIEE Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050505;
      color:white;
      font-family:
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      sans-serif;

      min-height:100vh;
      overflow-x:hidden;
      padding:28px;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;

      background:
      radial-gradient(
        circle at top left,
        rgba(88,101,242,.18),
        transparent 28%
      ),

      radial-gradient(
        circle at bottom right,
        rgba(0,180,255,.14),
        transparent 30%
      );

      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      backdrop-filter:blur(120px);
      z-index:-1;
    }

    .container{
      max-width:1400px;
      margin:auto;
    }

    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:26px;
      gap:20px;
      flex-wrap:wrap;
    }

    .logo{
      font-size:34px;
      font-weight:700;
      letter-spacing:-1px;
    }

    .logo span{
      opacity:.4;
      font-weight:400;
    }

    .live{
      display:flex;
      align-items:center;
      gap:10px;

      padding:12px 18px;

      border-radius:999px;

      background:
      rgba(255,255,255,.05);

      border:
      1px solid rgba(255,255,255,.08);

      backdrop-filter:blur(20px);

      font-size:13px;
      letter-spacing:.4px;
    }

    .live-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#73ffb4;

      box-shadow:
      0 0 14px #73ffb4;

      animation:pulse 1.4s infinite;
    }

    @keyframes pulse{

      0%{
        transform:scale(1);
        opacity:1;
      }

      50%{
        transform:scale(1.5);
        opacity:.5;
      }

      100%{
        transform:scale(1);
        opacity:1;
      }

    }

    .stats-grid{
      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(250px,1fr));

      gap:18px;

      margin-bottom:22px;
    }

    .card{
      position:relative;
      overflow:hidden;

      padding:28px;

      border-radius:30px;

      background:
      rgba(255,255,255,.05);

      border:
      1px solid rgba(255,255,255,.08);

      backdrop-filter:blur(24px);

      transition:.35s ease;
    }

    .card:hover{
      transform:translateY(-5px);

      border-color:
      rgba(255,255,255,.14);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;

      background:
      linear-gradient(
        135deg,
        rgba(255,255,255,.05),
        transparent
      );

      pointer-events:none;
    }

    .label{
      font-size:14px;
      opacity:.55;
      margin-bottom:14px;
    }

    .value{
      font-size:54px;
      font-weight:700;
      letter-spacing:-3px;
      line-height:1;
    }

    .green{
      color:#73ffb4;
    }

    .chart-card{
      margin-top:10px;

      padding:30px;

      border-radius:34px;

      background:
      rgba(255,255,255,.05);

      border:
      1px solid rgba(255,255,255,.08);

      backdrop-filter:blur(24px);
    }

    .chart-header{
      display:flex;
      justify-content:space-between;
      align-items:center;

      margin-bottom:30px;

      gap:15px;
      flex-wrap:wrap;
    }

    .chart-title{
      font-size:28px;
      font-weight:700;
      letter-spacing:-1px;
    }

    .badge{
      padding:10px 16px;

      border-radius:999px;

      background:
      rgba(255,255,255,.05);

      border:
      1px solid rgba(255,255,255,.08);

      font-size:13px;

      opacity:.85;
    }

    .chart-wrapper{
      position:relative;
      height:420px;
    }

    .section-title{
      margin-top:34px;
      margin-bottom:18px;

      font-size:30px;
      font-weight:700;
      letter-spacing:-1px;
    }

    .videos-grid{
      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(320px,1fr));

      gap:20px;
    }

    .video-card{
      overflow:hidden;

      border-radius:28px;

      background:
      rgba(255,255,255,.05);

      border:
      1px solid rgba(255,255,255,.08);

      backdrop-filter:blur(20px);

      transition:.35s ease;
    }

    .video-card:hover{
      transform:translateY(-4px);
    }

    .video-thumb{
      width:100%;
      height:210px;
      object-fit:cover;
    }

    .video-info{
      padding:22px;
    }

    .video-title{
      font-size:17px;
      line-height:1.45;
      margin-bottom:12px;
      font-weight:600;
    }

    .video-stats{
      opacity:.6;
      font-size:14px;
    }

    .footer{
      margin-top:50px;
      text-align:center;
      opacity:.35;
      font-size:13px;
    }

    @media(max-width:768px){

      body{
        padding:18px;
      }

      .logo{
        font-size:26px;
      }

      .value{
        font-size:42px;
      }

      .chart-card{
        padding:22px;
      }

      .chart-wrapper{
        height:300px;
      }

      .video-thumb{
        height:180px;
      }

    }

  </style>
</head>
<body>

<div class="container">

  <div class="navbar">

    <div class="logo">
      LOWDIEE <span>dashboard</span>
    </div>

    <div class="live">

      <div class="live-dot"></div>

      LIVE DATA

    </div>

  </div>

  <div class="stats-grid">

    <div class="card">

      <div class="label">
        Subscribers
      </div>

      <div class="value" id="subs">
        --
      </div>

    </div>

    <div class="card">

      <div class="label">
        Total Channel Views
      </div>

      <div class="value" id="views">
        --
      </div>

    </div>

    <div class="card">

      <div class="label">
        Uploaded Videos
      </div>

      <div class="value" id="videos">
        --
      </div>

    </div>

    <div class="card">

      <div class="label">
        Average Views / Short
      </div>

      <div class="value green" id="average">
        --
      </div>

    </div>

  </div>

  <div class="chart-card">

    <div class="chart-header">

      <div class="chart-title">
        Most Viewed Shorts
      </div>

      <div class="badge">
        Top Performing Content
      </div>

    </div>

    <div class="chart-wrapper">
      <canvas id="viewsChart"></canvas>
    </div>

  </div>

  <div class="section-title">
    Top Shorts
  </div>

  <div class="videos-grid">

  </div>

  <div class="footer">
    LOWDIEE YouTube Analytics
  </div>

</div>

<script>

async function loadDashboard() {

  try {

    const response =
      await fetch("/api/youtube");

    const data =
      await response.json();

    const channel =
      data.channel;

    const stats =
      channel.statistics;

    /*
      CHANNEL STATS
    */

    const subscribers =
      Number(stats.subscriberCount);

    const totalViews =
      Number(stats.viewCount);

    const totalVideos =
      Number(stats.videoCount);

    const averageViews =
      Math.floor(
        totalViews / totalVideos
      );

    document.getElementById("subs").innerText =
      formatNumber(subscribers);

    document.getElementById("views").innerText =
      formatNumber(totalViews);

    document.getElementById("videos").innerText =
      totalVideos.toLocaleString();

    document.getElementById("average").innerText =
      formatNumber(averageViews);

    /*
      SORT VIDEOS
    */

    const sortedVideos =
      [...data.videos]
      .sort((a,b) =>
        Number(b.views) - Number(a.views)
      );

    /*
      VIDEO GRID
    */

    const videosGrid =
      document.querySelector(".videos-grid");

    videosGrid.innerHTML = "";

    sortedVideos.forEach(video => {

      videosGrid.innerHTML += `

        <div class="video-card">

          <img
            class="video-thumb"
            src="${video.thumbnail}">

          <div class="video-info">

            <div class="video-title">
              ${video.title}
            </div>

            <div class="video-stats">

              ${Number(video.views).toLocaleString()} views

              •

              ${Number(video.likes).toLocaleString()} likes

            </div>

          </div>

        </div>

      `;

    });

    /*
      CHART
    */

    const ctx =
      document
      .getElementById("viewsChart");

    new Chart(ctx, {

      type: "bar",

      data: {

        labels:
          sortedVideos.map(video =>

            video.title.length > 20

            ?

            video.title.slice(0,20) + "..."

            :

            video.title

          ),

        datasets: [{

          data:
            sortedVideos.map(video =>
              Number(video.views)
            ),

          borderRadius:14,

          borderSkipped:false

        }]

      },

      options: {

        responsive:true,

        maintainAspectRatio:false,

        plugins: {

          legend: {
            display:false
          },

          tooltip: {

            backgroundColor:"#111",

            borderColor:
            "rgba(255,255,255,.1)",

            borderWidth:1,

            padding:14,

            titleColor:"#fff",

            bodyColor:"#aaa",

            callbacks: {

              label: function(context){

                return (
                  context.raw.toLocaleString()
                  + " views"
                );

              }

            }

          }

        },

        scales: {

          x: {

            ticks: {

              color:
              "rgba(255,255,255,.75)",

              maxRotation:0,

              minRotation:0

            },

            grid: {
              display:false
            }

          },

          y: {

            ticks: {

              color:
              "rgba(255,255,255,.5)",

              callback: function(value){

                if(value >= 1000000)
                  return (
                    value / 1000000
                  ) + "M";

                if(value >= 1000)
                  return (
                    value / 1000
                  ) + "K";

                return value;

              }

            },

            grid: {

              color:
              "rgba(255,255,255,.05)"

            }

          }

        }

      }

    });

  }

  catch(err){

    console.error(err);

    alert(
      "Błąd pobierania danych z YouTube API"
    );

  }

}

/*
  FORMAT
*/

function formatNumber(num){

  if(num >= 1000000){

    return (
      num / 1000000
    ).toFixed(1) + "M";

  }

  if(num >= 1000){

    return (
      num / 1000
    ).toFixed(1) + "K";

  }

  return num;

}

loadDashboard();

</script>

</body>
</html>
